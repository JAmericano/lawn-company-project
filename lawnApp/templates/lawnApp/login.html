<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli's Lawn Care Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Georgia, "Times New Roman", serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
                url("https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1920&q=80");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 370px;
            background: #ffffff;
            border-radius: 16px;
            padding: 28px 26px 22px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.22);
            text-align: center;
        }

        .logo-circle {
            width: 68px;
            height: 68px;
            border: 1.5px solid #3a3a3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: #222;
        }

        .main-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #111;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .main-title span {
            display: block;
            font-size: 0.95rem;
            margin-top: 2px;
        }

        .title-line {
            width: 50px;
            height: 2px;
            background-color: #6d8f63;
            margin: 10px auto 12px;
            border-radius: 2px;
        }

        .subtitle-line {
            font-family: Arial, sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #8b8b8b;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 14px;
        }

        label {
            font-family: Arial, sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            background-color: #eef3fb;
            border: none;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.9rem;
            height: 38px;
        }

        .form-control:focus {
            background-color: #eef3fb;
            box-shadow: 0 0 0 2px rgba(45, 90, 54, 0.15);
            border: none;
        }

        .btn-green {
            background-color: #1f5f2e;
            color: white;
            border: none;
            border-radius: 8px;
            height: 38px;
            width: 100%;
            font-family: Arial, sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .btn-green:hover {
            background-color: #184b24;
            color: white;
        }

        .footer-text {
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            color: #555;
            margin-top: 16px;
        }

        .footer-text a {
            color: #1f5f2e;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-circle">E</div>

        <div class="main-title">
            Welcome to Our
            <span>Lawn Company</span>
        </div>

        <div class="title-line"></div>

        <div class="subtitle-line">
            QUALITY • RELIABILITY • PROFESSIONAL SERVICE
        </div>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control">
    </div>

    <button type="submit" class="btn-green">Login</button>
</form>

<div class="footer-text">
    Don’t have an account? 
    <a href="{% url 'register' %}">Create one</a>
</div>
